<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - BookHaven</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 28px;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            width: 420px;
            max-width: 100%;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-size: 22px;
        }
        .hint {
            text-align: center;
            color: #555;
            margin-bottom: 18px;
            line-height: 1.4;
            font-size: 14px;
        }
        .form-group { margin-top: 10px; }
        label { display: block; font-weight: bold; color: #333; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 14px;
        }
        .btn:hover { opacity: 0.9; }
        .bottom-link {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
        }
        .bottom-link a { color: #667eea; text-decoration: none; }
        .error {
            margin-top: 10px;
            background: #fff3f3;
            color: #c82333;
            border: 1px solid #f5c2c7;
            padding: 10px;
            border-radius: 10px;
            display: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1><i class="fas fa-shield-alt"></i> Verify OTP</h1>
        <div class="hint">
            Enter the 6-digit OTP from your Google Authenticator app to complete login.
        </div>

        <div class="form-group">
            <label>6-digit OTP</label>
            <input id="otp" type="text" inputmode="numeric" placeholder="123456" autocomplete="one-time-code"/>
        </div>

        <button id="verify-btn" class="btn" type="button">
            <i class="fas fa-check"></i> Verify &amp; Login
        </button>

        <div class="bottom-link">
            <a href="login.html">Back to login</a>
        </div>
        <div id="error-box" class="error"></div>
    </div>

    <script src="js/site-config.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/otp-login.js"></script>
</body>
</html>
